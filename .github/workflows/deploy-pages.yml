name: Deploy static SOX dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 07:30 KST Tue-Sat: SOX latest-date collection after the prior U.S. regular session.
    - cron: "30 22 * * 1-5"
    # 09:30/11:30/13:30 KST Tue-Sat: 2-hour retries when providers lag or the primary run fails.
    - cron: "30 0 * * 2-6"
    - cron: "30 2 * * 2-6"
    - cron: "30 4 * * 2-6"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    outputs:
      should_collect: ${{ steps.freshness.outputs.should_collect }}
      should_deploy: ${{ steps.freshness.outputs.should_deploy }}
      freshness_reason: ${{ steps.freshness.outputs.freshness_reason }}
      expected_data_as_of: ${{ steps.freshness.outputs.expected_data_as_of }}
      actual_data_as_of: ${{ steps.freshness.outputs.actual_data_as_of }}
    steps:
      - uses: actions/checkout@v4
      - name: Decide whether SOX collection is needed
        id: freshness
        run: |
          python3 scripts/check_sox_freshness.py --event-name "${{ github.event_name }}" | tee /tmp/sox-freshness.env
          cat /tmp/sox-freshness.env >> "$GITHUB_OUTPUT"
  build:
    needs: freshness
    if: needs.freshness.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Refresh generated SOX data
        if: needs.freshness.outputs.should_collect == 'true'
        run: python3 scripts/fetch_sox_data.py --offline-ok --allow-degraded
      - name: Verify static dashboard
        run: npm test
      - name: Commit generated SOX data
        if: needs.freshness.outputs.should_collect == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          if git diff --quiet -- data/sox-analysis.json data/sox-history.json data/summary.json; then
            echo "No generated SOX data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sox-analysis.json data/sox-history.json data/summary.json
          cat > /tmp/sox-data-commit-message <<'EOF'
          Preserve SOX snapshots for date-selectable static research

          Constraint: GitHub Pages serves generated JSON only; live public-source access stays in the refresh workflow.
          Confidence: high
          Scope-risk: narrow
          Directive: Keep sox-history.json append/replace-by-dataAsOf so users can inspect stored dates without browser-side finance calls.
          Tested: npm test
          Not-tested: Provider completeness beyond public Nasdaq/Yahoo endpoints.
          EOF
          git commit -F /tmp/sox-data-commit-message
          branch="${GITHUB_REF_NAME:-main}"
          git fetch origin "$branch:refs/remotes/origin/$branch"
          git rebase "origin/$branch"
          npm test
          git push origin "HEAD:$branch"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [freshness, build]
    if: needs.freshness.outputs.should_deploy == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
